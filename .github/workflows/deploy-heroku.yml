name: Deploy backend to Heroku on push to main

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-heroku.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # subtree split necesita historia completa

      - name: Push backend/ subtree to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP: agentflow
        run: |
          set -e
          git config user.email "ci@agentflow.local"
          git config user.name "GitHub Actions"

          # Trim whitespace del token.
          TOKEN=$(printf '%s' "$HEROKU_API_KEY" | tr -d '[:space:]')
          echo "Token length: ${#TOKEN}"

          # Auth: Heroku quiere "email:apikey" base64 vía Authorization header.
          # (Basic auth con username/password directo en URL falla.)
          AUTH=$(printf '%s' "arenazl@gmail.com:$TOKEN" | base64 -w 0)

          # Split: tomar solo backend/ como commit/branch desechable
          SPLIT_SHA=$(git subtree split --prefix=backend HEAD)
          echo "Split SHA: $SPLIT_SHA"

          # Push forzado al remote de Heroku con header Authorization explícito
          git -c http.extraheader="Authorization: Basic $AUTH" push --force \
            "https://git.heroku.com/$HEROKU_APP.git" \
            "$SPLIT_SHA:refs/heads/main"
