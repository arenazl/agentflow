name: Deploy backend to Heroku on push to main

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-heroku.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # subtree split necesita historia completa

      - name: Push backend/ subtree to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          HEROKU_APP: agentflow
        run: |
          set -e
          git config user.email "ci@agentflow.local"
          git config user.name "GitHub Actions"

          # Trim whitespace del token (los secrets a veces traen \n trailing).
          TOKEN=$(printf '%s' "$HEROKU_API_KEY" | tr -d '[:space:]')
          echo "Token length (debe ser ~36): ${#TOKEN}"

          # Auth git via credential.helper store + ~/.git-credentials
          printf 'https://heroku:%s@git.heroku.com\n' "$TOKEN" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          git config --global credential.helper store

          # Split: tomar solo backend/ como commit/branch desechable
          SPLIT_SHA=$(git subtree split --prefix=backend HEAD)
          echo "Split SHA: $SPLIT_SHA"

          # Push forzado al remote de Heroku
          git push --force \
            "https://git.heroku.com/$HEROKU_APP.git" \
            "$SPLIT_SHA:refs/heads/main"
