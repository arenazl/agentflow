name: Deploy backend to Heroku on push to main

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-heroku.yml'

jobs:
  deploy:
    # ubuntu-22.04 tiene Heroku CLI preinstalado (24.04 lo removió).
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: agentflow
          heroku_email: arenazl@gmail.com
          appdir: backend
          buildpack: heroku/python
